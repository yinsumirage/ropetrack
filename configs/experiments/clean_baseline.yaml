name: clean_baseline
stage: 1
defaults:
  method: wilor_anyhand
  mode: gt_bbox
  units: m
  device: cuda
  batch_size: 128
  detector_batch_size: 1
  num_workers: 0
  protocol_check_samples: 32
  protocol_tolerance_m: 0.001
  eval_num_workers: 8
  out_dir: /data/wentao/ropetrack/runs/{experiment}/{dataset}_{method}
datasets:
  - freihand
  - ho3d_v2
  - ho3d_v3
methods:
  wilor_original:
    backend: wilor
    wilor_ckpt: pretrained_models/wilor_final.ckpt
    wilor_cfg: pretrained_models/model_config_wilor.yaml
  wilor_anyhand:
    backend: wilor
    wilor_ckpt: pretrained_models/anyhand_wilor.ckpt
    wilor_cfg: pretrained_models/model_config_wilor.yaml
  hamer_original:
    backend: hamer
    hamer_ckpt: pretrained_models/hamer_ckpts/checkpoints/hamer.ckpt
  hamer_anyhand:
    backend: hamer
    hamer_ckpt: pretrained_models/hamer_ckpts/checkpoints/anyhand_hamer.ckpt
metrics:
  freihand:
    - pa_mpjpe_mm
    - pa_mpvpe_mm
    - f_al_score_5
    - f_al_score_15
  ho3d:
    - auc_j
    - pa_mpjpe_mm
    - auc_v
    - pa_mpvpe_mm
    - f_al_score_5
    - f_al_score_15
notes: GT-bbox clean reproduction table before hard splits or rope labels.
